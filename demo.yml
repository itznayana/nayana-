---
- name: Linux Server Health Check Automation
  hosts: all
  become: true
  gather_facts: true

  vars:
    threshold: 80

    servicenow_instance: "https://nowlearning-nlinst04395162-8xqeq-0001.lab.service-now.com"
    servicenow_user: "admin"
    servicenow_password: "2NBHVSMh2zge"

  

    close_code_value: "Solution provided"

    servicenow_incident_url: "https://nowlearning-nlinst04395162-8xqeq-0001.lab.service-now.com/api/now/table/incident/b568707c214203107f44dc408768e8a5"

  tasks:

    - name: Capture CPU usage
      shell: |
        top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4}'
      register: cpu_before_raw
      changed_when: false

    - name: Capture Memory usage
      shell: |
        free | awk 'FNR==2{printf "%.2f", ($3/$2)*100}'
      register: mem_before_raw
      changed_when: false

    - name: Capture Disk usage
      shell: |
        df -h / | awk 'FNR==2{print $5}' | tr -d '%'
      register: disk_before_raw
      changed_when: false

    - name: Set values
      set_fact:
        cpu_before: "{{ cpu_before_raw.stdout | float }}"
        mem_before: "{{ mem_before_raw.stdout | float }}"
        disk_before: "{{ disk_before_raw.stdout | float }}"

    - name: Determine health
      set_fact:
        server_healthy: "{{ (cpu_before | float < 80) and (mem_before | float < 80) and (disk_before | float < 80) }}"

    #################################################################
    # HEALTHY SERVER
    #################################################################

    - name: Build healthy notes
      when: server_healthy | bool
      set_fact:
        healthy_work_notes: |
          HEALTH CHECK RESULT

          CPU Usage : {{ cpu_before }} %
          Memory Usage : {{ mem_before }} %
          Disk Usage : {{ disk_before }} %

          Status : HEALTHY

    - name: Close incident
      when: server_healthy | bool
      uri:
        url: "{{ servicenow_incident_url }}"
        method: PATCH
        user: "{{ servicenow_user }}"
        password: "{{ servicenow_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          work_notes: "{{ healthy_work_notes }}"
          close_code: "{{ close_code_value }}"
          close_notes: "Linux server health check completed successfully."
          state: "7"
        status_code:
          - 200
          - 201
      register: healthy_result

    #################################################################
    # BREACH SERVER
    #################################################################

    - name: Build breach notes
      when: not server_healthy | bool
      set_fact:
        breach_work_notes: |
          THRESHOLD BREACH DETECTED

          CPU Usage : {{ cpu_before }} %
          Memory Usage : {{ mem_before }} %
          Disk Usage : {{ disk_before }} %

          Threshold : {{ threshold }} %

          Action : Route To Manual Queue

    - name: Update incident breach
      when: not server_healthy | bool
      uri:
        url: "{{ servicenow_incident_url }}"
        method: PATCH
        user: "{{ servicenow_user }}"
        password: "{{ servicenow_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          work_notes: "{{ breach_work_notes }}"
          state: "2"
        status_code:
          - 200
          - 201
      register: breach_result

    - name: Display Result
      debug:
        msg:
          - "CPU={{ cpu_before }}"
          - "MEMORY={{ mem_before }}"
          - "DISK={{ disk_before }}"
          - "HEALTHY={{ server_healthy }}"
